spring:
  application:
    name: ptmanager-backend
  datasource:
    url: jdbc:h2:mem:ptmanager;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# To use PostgreSQL instead of the embedded H2 database, override the
# datasource (e.g. via SPRING_DATASOURCE_URL) and add the
# org.postgresql:postgresql driver. JPA entities are DB-agnostic.
